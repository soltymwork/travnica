media:
  path: images

content:
  # ===== FOLDER COLLECTIONS (add/edit/delete) =====

  - name: aktuality
    label: Aktuality
    type: collection
    path: content/aktuality
    format: yaml-frontmatter
    view:
      fields: [title, date, category, description]
      primary: title
      sort: [date, title]
      default:
        sort: date
        order: desc
    fields:
      - name: title
        label: Titulok
        type: string
      - name: date
        label: Dátum
        type: date
      - name: category
        label: Kategória
        type: select
        options: ["Kultúra", "Turistika", "Samospráva", "Infraštruktúra", "Príroda"]
      - name: description
        label: Krátky popis
        type: text
      - name: body
        label: Telo článku
        type: rich-text

  - name: pamiatky
    label: Pamiatky
    type: collection
    path: content/pamiatky
    format: yaml-frontmatter
    view:
      fields: [title, badge, year]
      primary: title
    fields:
      - name: title
        label: Názov pamiatky
        type: string
      - name: badge
        label: Odznak/Kategória
        type: string
      - name: year
        label: Rok/Obdobie
        type: string
      - name: image
        label: Obrázok
        type: image
      - name: body
        label: Popis
        type: rich-text

  # ===== DOMOVSKÁ STRÁNKA =====

  - name: hero
    label: Domov – Hero sekcia
    type: file
    path: content/hero.json
    fields:
      - name: eyebrow
        label: Nadtext (eyebrow)
        type: string
      - name: title
        label: Hlavný titulok
        type: string
      - name: subtitle
        label: Podtitulok
        type: string
      - name: highlight
        label: Zvýraznený text (rok)
        type: string
      - name: badges
        label: Odznaky
        type: list
        fields:
          - name: badge
            label: Odznak
            type: string
      - name: cta_text
        label: Text tlačidla
        type: string
      - name: cta_link
        label: Odkaz tlačidla
        type: string

  - name: domov_stats
    label: Domov – Štatistiky
    type: file
    path: content/index.json
    fields:
      - name: stats
        label: Štatistiky
        type: list
        fields:
          - name: number
            label: Číslo
            type: string
          - name: label
            label: Popis
            type: string

  - name: quicklinks
    label: Domov – Rýchle odkazy
    type: file
    path: content/quicklinks.json
    fields:
      - name: tag
        label: Tag sekcie
        type: string
      - name: title
        label: Nadpis sekcie
        type: string
      - name: links
        label: Odkazy
        type: list
        fields:
          - name: icon
            label: Ikona (emoji)
            type: string
          - name: title
            label: Titulok
            type: string
          - name: text
            label: Popis
            type: text
          - name: url
            label: URL odkaz
            type: string

  # ===== O OBCI =====

  - name: o_obci_text
    label: O obci – Úvodný text
    type: file
    path: content/o-obci.md
    fields:
      - name: body
        label: Text o obci
        type: rich-text

  - name: o_obci_cards
    label: O obci – Informačné karty
    type: file
    path: content/o-obci-cards.json
    fields:
      - name: cards
        label: Karty
        type: list
        fields:
          - name: icon
            label: Ikona (emoji)
            type: string
          - name: title
            label: Titulok
            type: string
          - name: text
            label: Text
            type: text

  # ===== HISTÓRIA =====

  - name: historia
    label: História – Časová os
    type: file
    path: content/historia.json
    fields:
      - name: entries
        label: Udalosti
        type: list
        fields:
          - name: year
            label: Rok / Obdobie
            type: string
          - name: title
            label: Titulok udalosti
            type: string
          - name: description
            label: Popis udalosti
            type: text

  # ===== PRÍRODA =====

  - name: priroda_text
    label: Príroda – Úvodný text
    type: file
    path: content/priroda.md
    fields:
      - name: body
        label: Text o prírode
        type: rich-text

  - name: priroda_features
    label: Príroda – Zaujímavosti
    type: file
    path: content/priroda-list.json
    fields:
      - name: features
        label: Zaujímavosti
        type: list
        fields:
          - name: icon
            label: Ikona (emoji)
            type: string
          - name: title
            label: Názov
            type: string
          - name: text
            label: Popis
            type: text

  - name: priroda_cards
    label: Príroda – Aktivity (karty)
    type: file
    path: content/priroda-cards.json
    fields:
      - name: cards
        label: Karty aktivít
        type: list
        fields:
          - name: icon
            label: Ikona (emoji)
            type: string
          - name: title
            label: Titulok
            type: string
          - name: text
            label: Text
            type: text

  # ===== PAMIATKY je vyššie ako collection =====

  # ===== KONTAKT =====

  - name: kontakt
    label: Kontakt – Údaje
    type: file
    path: content/kontakt.json
    fields:
      - name: address
        label: Adresa úradu
        type: string
      - name: phone
        label: Telefón
        type: string
      - name: email
        label: E-mail
        type: string
      - name: hours
        label: Úradné hodiny
        type: string
      - name: website
        label: Webová adresa
        type: string
      - name: facebook
        label: Facebook link
        type: string

  # ===== FOOTER (globálny) =====

  - name: footer
    label: Pätička (footer)
    type: file
    path: content/footer.json
    fields:
      - name: brand_text
        label: Popis obce
        type: text
      - name: facebook_url
        label: Facebook URL
        type: string
      - name: useful_links
        label: Užitočné linky
        type: list
        fields:
          - name: title
            label: Názov
            type: string
          - name: url
            label: URL
            type: string
      - name: copyright
        label: Copyright text
        type: string
      - name: credit
        label: Kredity
        type: string
