local_backend: true
backend:
  name: github
  repo: soltymwork/travnica
  branch: main
  base_url: https://auth.sveltia.org
  auth_endpoint: /authenticate

media_folder: "images"
public_folder: "images"

collections:
  # ===== FOLDER COLLECTIONS (add/edit/delete items) =====
  
  - name: "aktuality"
    label: "📰 Aktuality"
    label_singular: "Aktualita"
    folder: "content/aktuality"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "md"
    fields:
      - {label: "Titulok", name: "title", widget: "string"}
      - {label: "Dátum", name: "date", widget: "datetime"}
      - {label: "Kategória", name: "category", widget: "select", options: ["Kultúra", "Turistika", "Samospráva", "Infraštruktúra", "Príroda"]}
      - {label: "Krátky popis", name: "description", widget: "text"}
      - {label: "Telo článku", name: "body", widget: "markdown"}

  - name: "pamiatky"
    label: "🏛️ Pamiatky"
    label_singular: "Pamiatka"
    folder: "content/pamiatky"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "md"
    fields:
      - {label: "Názov pamiatky", name: "title", widget: "string"}
      - {label: "Odznak/Kategória", name: "badge", widget: "string"}
      - {label: "Rok/Obdobie", name: "year", widget: "string"}
      - {label: "Obrázok", name: "image", widget: "image", required: false}
      - {label: "Popis", name: "body", widget: "markdown"}

  # ===== DOMOVSKÁ STRÁNKA =====

  - name: "domov"
    label: "🏠 Domovská stránka"
    files:
      - file: "content/hero.json"
        label: "Hero sekcia (banner)"
        name: "hero"
        fields:
          - {label: "Nadtext (eyebrow)", name: "eyebrow", widget: "string", default: "Vitajte v"}
          - {label: "Hlavný titulok", name: "title", widget: "string", default: "Trávnica"}
          - {label: "Podtitulok", name: "subtitle", widget: "string"}
          - {label: "Zvýraznený text (rok)", name: "highlight", widget: "string", default: "1075 n.l."}
          - label: "Odznaky"
            name: "badges"
            widget: "list"
            field: {label: "Odznak", name: "badge", widget: "string"}
          - {label: "Text tlačidla", name: "cta_text", widget: "string", default: "Spoznajte nás"}
          - {label: "Odkaz tlačidla", name: "cta_link", widget: "string", default: "o-obci.html"}

      - file: "content/index.json"
        label: "Štatistiky (čísla)"
        name: "stats"
        fields:
          - label: "Štatistiky"
            name: "stats"
            widget: "list"
            fields:
              - {label: "Číslo", name: "number", widget: "string"}
              - {label: "Popis", name: "label", widget: "string"}

      - file: "content/quicklinks.json"
        label: "Rýchle odkazy (karty)"
        name: "quicklinks"
        fields:
          - {label: "Nadpis sekcie", name: "title", widget: "string", default: "Čo u nás nájdete"}
          - {label: "Tag", name: "tag", widget: "string", default: "Objavte Trávnicu"}
          - label: "Odkazy"
            name: "links"
            widget: "list"
            fields:
              - {label: "Ikona (emoji)", name: "icon", widget: "string", hint: "Zadajte emoji, napr. 🏡 📜 🏛️"}
              - {label: "Titulok", name: "title", widget: "string"}
              - {label: "Popis", name: "text", widget: "text"}
              - {label: "URL odkaz", name: "url", widget: "string"}

  # ===== O OBCI =====

  - name: "o-obci"
    label: "🏡 O obci"
    files:
      - file: "content/o-obci.md"
        label: "Úvodný text"
        name: "o_obci_text"
        fields:
          - {label: "Text o obci", name: "body", widget: "markdown"}

      - file: "content/o-obci-cards.json"
        label: "Informačné karty"
        name: "o_obci_cards"
        fields:
          - label: "Karty"
            name: "cards"
            widget: "list"
            fields:
              - {label: "Ikona (emoji)", name: "icon", widget: "string", hint: "Zadajte emoji, napr. 📍 🌳 🏛️"}
              - {label: "Titulok", name: "title", widget: "string"}
              - {label: "Text", name: "text", widget: "text"}

  # ===== HISTÓRIA =====

  - name: "historia"
    label: "📜 História"
    files:
      - file: "content/historia.json"
        label: "Časová os udalostí"
        name: "historia_timeline"
        fields:
          - label: "Udalosti"
            name: "entries"
            widget: "list"
            fields:
              - {label: "Rok / Obdobie", name: "year", widget: "string"}
              - {label: "Titulok udalosti", name: "title", widget: "string"}
              - {label: "Popis udalosti", name: "description", widget: "text"}

  # ===== PRÍRODA =====

  - name: "priroda"
    label: "🌿 Príroda"
    files:
      - file: "content/priroda.md"
        label: "Úvodný text"
        name: "priroda_text"
        fields:
          - {label: "Text o prírode", name: "body", widget: "markdown"}

      - file: "content/priroda-list.json"
        label: "Zaujímavosti (veľké karty)"
        name: "priroda_features"
        fields:
          - label: "Zaujímavosti"
            name: "features"
            widget: "list"
            fields:
              - {label: "Ikona (emoji)", name: "icon", widget: "string", hint: "Zadajte emoji, napr. 🏞️ 🌿 🧭"}
              - {label: "Názov", name: "title", widget: "string"}
              - {label: "Popis", name: "text", widget: "text"}

      - file: "content/priroda-cards.json"
        label: "Aktivity (malé karty)"
        name: "priroda_cards"
        fields:
          - label: "Karty aktivít"
            name: "cards"
            widget: "list"
            fields:
              - {label: "Ikona (emoji)", name: "icon", widget: "string", hint: "Zadajte emoji, napr. 🎣 🚴 🌸"}
              - {label: "Titulok", name: "title", widget: "string"}
              - {label: "Text", name: "text", widget: "text"}

  # ===== KONTAKT =====

  - name: "kontakt"
    label: "✉️ Kontakt"
    files:
      - file: "content/kontakt.json"
        label: "Kontaktné údaje"
        name: "kontakt_data"
        fields:
          - {label: "Adresa úradu", name: "address", widget: "string"}
          - {label: "Telefón", name: "phone", widget: "string"}
          - {label: "E-mail", name: "email", widget: "string"}
          - {label: "Úradné hodiny", name: "hours", widget: "string"}
          - {label: "Webová adresa", name: "website", widget: "string"}
          - {label: "Facebook link", name: "facebook", widget: "string"}

  # ===== FOOTER (globálny) =====

  - name: "footer"
    label: "🔻 Pätička (footer)"
    files:
      - file: "content/footer.json"
        label: "Obsah pätičky"
        name: "footer_content"
        fields:
          - {label: "Popis obce", name: "brand_text", widget: "text"}
          - {label: "Facebook URL", name: "facebook_url", widget: "string"}
          - label: "Užitočné linky"
            name: "useful_links"
            widget: "list"
            fields:
              - {label: "Názov", name: "title", widget: "string"}
              - {label: "URL", name: "url", widget: "string"}
          - {label: "Copyright text", name: "copyright", widget: "string"}
          - {label: "Kredity", name: "credit", widget: "string"}
