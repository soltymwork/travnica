name: Generate Collection Manifests
on:
  push:
    branches: [main]
    paths: ['content/**']
jobs:
  generate-manifests:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Generate all manifests
        run: |
          for dir in content/aktuality content/pamiatky content/historia content/o-obci-cards content/quicklinks content/stats content/priroda-features content/priroda-cards content/footer-links; do
            if [ -d "$dir" ]; then
              cd "$dir"
              ls -1 *.md 2>/dev/null | sort | jq -R -s 'split("\n") | map(select(length > 0))' > manifest.json
              echo "Generated: $dir/manifest.json"
              cd -
            fi
          done
      - name: Commit manifests
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add content/*/manifest.json
          git diff --staged --quiet || git commit -m "Auto-update collection manifests"
          git push
